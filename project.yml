name: MyBarTrack
options:
  bundleIdPrefix: com.polidisio
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  MyBarTrack:
    type: application
    platform: iOS
    sources:
      - path: MIConsumoBar
        excludes:
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: MyBarTrack-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.polidisio.MyBarTrack
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies: []

  DrinkTrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MIConsumoBarTests
    settings:
      base:
        INFOPLIST_FILE: MIConsumoBarTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.polidisio.MyBarTrackTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyBarTrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MyBarTrack"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: MyBarTrack

schemes:
  MyBarTrack:
    build:
      targets:
        MyBarTrack: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DrinkTrackTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
